<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGrid Analytics | Adit Sharma</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --glass-bg: rgba(17, 24, 39, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Cinematic Animated Background Orbs */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: -1;
            animation: float 10s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-blue);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-purple);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Premium Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        .brand-text h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 12px;
            color: var(--neon-blue);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Status Indicator */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-blue);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 240, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }

        /* Main Dashboard Container */
        .container {
            flex: 1;
            width: 100%;
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tableau-wrapper {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 700px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tableau-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(0, 240, 255, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 240, 255, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff; /* Keeps Tableau white */
            border-radius: 0 0 24px 24px;
        }

        /* Fake Window Controls for Aesthetic */
        .window-controls {
            height: 40px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        
        .window-title {
            margin-left: 15px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(3, 7, 18, 0.5);
            backdrop-filter: blur(10px);
        }

        .footer span {
            color: #fff;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-blue), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .status-badge { display: none; }
            .tableau-wrapper { height: 70vh; min-height: 500px; border-radius: 16px; }
            .container { padding: 0 10px; margin: 20px auto; }
        }
    </style>
</head>
<body>

    <div class="ambient-light orb-1"></div>
    <div class="ambient-light orb-2"></div>

    <nav class="navbar">
        <div class="brand-container">
            <span class="brand-icon">⚡</span>
            <div class="brand-text">
                <h1>PowerGrid Analytics</h1>
                <p>India Consumption Data</p>
            </div>
        </div>
        <div class="status-badge">
            <span class="pulse-dot"></span>
            LIVE SYSTEM
        </div>
    </nav>

    <div class="container">
        <div class="tableau-wrapper">
            <div class="window-controls">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <span class="window-title">Dashboard / India_2019_2020.twbx</span>
            </div>
            
            <iframe src="{{ url }}" title="Tableau Dashboard" allowfullscreen></iframe>
        </div>
    </div>

    <div class="footer">
        Engineered by <span>Adit Sharma</span> &nbsp;|&nbsp; Powered by Flask & Tableau
    </div>

</body>
</html>
